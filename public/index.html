<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ViralPost AI — Générateur de posts IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e17;
      --bg-panel: rgba(15, 23, 42, 0.85);
      --bg-input: rgba(30, 41, 59, 0.6);
      --border: rgba(6, 182, 212, 0.35);
      --glow: rgba(6, 182, 212, 0.5);
      --accent: #06b6d4;
      --accent-dim: #22d3ee;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --success: #34d399;
      --error: #f87171;
      --radius: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      background-image:
        linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .header {
      text-align: center;
      padding: 2.5rem 1rem 2rem;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }
    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin: 0 0 0.5rem;
      background: linear-gradient(135deg, var(--accent-dim), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .tagline {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin: 0;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 0 1.25rem 3rem; }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px -10px rgba(6, 182, 212, 0.15);
    }
    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .panel-title::before {
      content: '';
      width: 4px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 0.45rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); opacity: 0.7; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
    }
    textarea { min-height: 90px; resize: vertical; line-height: 1.5; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } }

    .network-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .network-tabs button {
      flex: 1;
      min-width: 0;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text-dim);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .network-tabs button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .network-tabs button.active {
      background: rgba(6, 182, 212, 0.15);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 20px -5px var(--glow);
    }

    .emoji-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .emoji-tabs button {
      flex: 1;
      min-width: 100px;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .emoji-tabs button:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .emoji-tabs button.active {
      background: rgba(6, 182, 212, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-generate {
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      color: #0a0e17;
      border: none;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-transform: uppercase;
      box-shadow: 0 0 25px -5px rgba(6, 182, 212, 0.4);
    }
    .btn-generate:hover:not(:disabled) {
      filter: brightness(1.1);
      box-shadow: 0 0 35px -5px rgba(6, 182, 212, 0.5);
      transform: translateY(-1px);
    }
    .btn-generate:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .btn-generate .spinner {
      width: 1.1em;
      height: 1.1em;
      border: 2px solid rgba(10,14,23,.3);
      border-top-color: #0a0e17;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-copy {
      padding: 0.6rem 1.25rem;
      background: var(--bg-input);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-copy:hover { background: rgba(6, 182, 212, 0.1); border-color: var(--accent); }
    .btn-copy.copied { background: rgba(52, 211, 153, 0.15); border-color: var(--success); color: var(--success); }

    .result-wrap {
      margin-top: 1rem;
      padding: 1.25rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 140px;
    }
    .result-wrap .result {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
      line-height: 1.65;
      margin: 0;
      color: var(--text);
    }
    .result-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }
    .result-card { display: none; animation: fadeIn 0.35s ease; }
    .result-card.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .error-box {
      display: none;
      color: var(--error);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .error-box.visible { display: block; animation: fadeIn 0.25s ease; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>ViralPost AI</h1>
    <p class="tagline">Générateur de posts LinkedIn, Instagram & Facebook — l’IA suit vos consignes à la lettre</p>
  </header>

  <main class="container">
    <section class="panel" aria-label="Contexte du post">
      <p class="panel-title">Contexte</p>
      <label for="subject">Sujet du post</label>
      <textarea id="subject" placeholder="Ex : Les bienfaits du télétravail, tendances 2025, lancement d’un produit..." rows="3"></textarea>
      <div class="row">
        <div>
          <label for="tone">Ton</label>
          <select id="tone">
            <option value="professionnel">Professionnel</option>
            <option value="humoristique">Humoristique</option>
            <option value="provocateur">Provocateur</option>
          </select>
        </div>
        <div>
          <label for="audience">Audience cible</label>
          <input type="text" id="audience" placeholder="Ex : Entrepreneurs, étudiants, marketeurs..." required />
        </div>
      </div>
    </section>

    <section class="panel" aria-label="Réseau et moteur">
      <p class="panel-title">Réseau & moteur</p>
      <label id="network-label">Réseau social</label>
      <div class="network-tabs" id="network-tabs" role="tablist" aria-labelledby="network-label">
        <button type="button" role="tab" aria-selected="true" data-network="linkedin" class="active">LinkedIn</button>
        <button type="button" role="tab" aria-selected="false" data-network="instagram" tabindex="-1">Instagram</button>
        <button type="button" role="tab" aria-selected="false" data-network="facebook" tabindex="-1">Facebook</button>
      </div>
      <label for="engine">Moteur IA</label>
      <select id="engine">
        <option value="google">Google (Gemini)</option>
        <option value="mistral">Mistral AI</option>
      </select>
    </section>

    <section class="panel" aria-label="Personnalisation">
      <p class="panel-title">Personnalisation</p>
      <label id="emoji-label">Emojis</label>
      <div class="emoji-tabs" id="emoji-tabs" role="tablist" aria-labelledby="emoji-label">
        <button type="button" role="tab" aria-selected="false" data-emoji="none" tabindex="-1">Aucun</button>
        <button type="button" role="tab" aria-selected="false" data-emoji="few" tabindex="-1">Peu (3–5)</button>
        <button type="button" role="tab" aria-selected="true" data-emoji="many" class="active">Beaucoup</button>
      </div>
      <label for="custom_instructions">Instructions supplémentaires (optionnel)</label>
      <textarea id="custom_instructions" placeholder="Ex : Mentionner un chiffre choc en début de post. Finir par une question ouverte. Éviter le mot « impact ». Maximum 200 mots..." rows="3"></textarea>
      <p style="font-size: 0.8rem; color: var(--text-dim); margin: -0.5rem 0 0;">L’IA respectera ces consignes à la lettre.</p>
    </section>

    <section class="panel">
      <button type="button" id="generate" class="btn-generate" aria-busy="false">
        <span class="btn-text">Générer le post</span>
      </button>
    </section>

    <section class="panel result-card" id="result-card" aria-live="polite">
      <p class="panel-title">Résultat</p>
      <p class="result-meta" id="result-meta"></p>
      <div class="result-wrap">
        <div class="result" id="result"></div>
      </div>
      <div style="margin-top: 1rem;">
        <button type="button" id="copy" class="btn-copy" aria-label="Copier le texte">
          <span class="copy-icon">📋</span>
          <span class="copy-text">Copier</span>
        </button>
      </div>
    </section>

    <div id="error" class="error-box" role="alert"></div>
  </main>

  <footer>ViralPost AI — Génération pilotée par vos consignes</footer>

  <script>
    const API = '/api/generate';
    let selectedNetwork = 'linkedin';
    let selectedEmoji = 'many';

    const networkLabels = { linkedin: 'LinkedIn', instagram: 'Instagram', facebook: 'Facebook' };
    const engineLabels = { google: 'Gemini', mistral: 'Mistral AI' };

    document.querySelectorAll('#network-tabs button').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#network-tabs button').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
          b.setAttribute('tabindex', '-1');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        btn.setAttribute('tabindex', '0');
        selectedNetwork = btn.dataset.network;
      });
    });

    document.querySelectorAll('#emoji-tabs button').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#emoji-tabs button').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
          b.setAttribute('tabindex', '-1');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        btn.setAttribute('tabindex', '0');
        selectedEmoji = btn.dataset.emoji;
      });
    });

    const generateBtn = document.getElementById('generate');
    const btnText = generateBtn.querySelector('.btn-text');
    const resultCard = document.getElementById('result-card');
    const resultMeta = document.getElementById('result-meta');
    const resultEl = document.getElementById('result');
    const copyBtn = document.getElementById('copy');
    const copyTextEl = copyBtn.querySelector('.copy-text');
    const errorEl = document.getElementById('error');

    function setLoading(loading) {
      generateBtn.disabled = loading;
      generateBtn.setAttribute('aria-busy', loading);
      btnText.innerHTML = loading ? '<span class="spinner"></span> Génération…' : 'Générer le post';
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
      resultCard.classList.remove('visible');
    }
    function hideError() {
      errorEl.classList.remove('visible');
    }

    generateBtn.addEventListener('click', async () => {
      const subject = document.getElementById('subject').value.trim();
      const audience = document.getElementById('audience').value.trim();
      const custom_instructions = document.getElementById('custom_instructions').value.trim();
      if (!subject || !audience) {
        showError('Remplissez le sujet et l’audience.');
        return;
      }
      setLoading(true);
      hideError();
      resultCard.classList.remove('visible');

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            subject,
            tone: document.getElementById('tone').value,
            audience,
            network: selectedNetwork,
            engine: document.getElementById('engine').value,
            emoji_level: selectedEmoji,
            custom_instructions: custom_instructions || undefined
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = [data.error, data.detail].filter(Boolean).join(' — ') || ('Erreur ' + res.status);
          showError(msg);
          return;
        }
        resultEl.textContent = data.content || '';
        resultMeta.textContent = networkLabels[selectedNetwork] + ' · ' + engineLabels[document.getElementById('engine').value] + (selectedEmoji === 'none' ? ' · Sans emoji' : selectedEmoji === 'few' ? ' · Peu d’emojis' : ' · Beaucoup d’emojis');
        resultCard.classList.add('visible');
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (e) {
        showError('Erreur réseau. Vérifiez votre connexion et réessayez.');
      } finally {
        setLoading(false);
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = resultEl.textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copyTextEl.textContent = 'Copié';
        copyBtn.classList.add('copied');
        copyBtn.querySelector('.copy-icon').textContent = '✓';
        setTimeout(() => {
          copyTextEl.textContent = 'Copier';
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('.copy-icon').textContent = '📋';
        }, 2000);
      }).catch(() => {
        copyTextEl.textContent = 'Échec';
        setTimeout(() => { copyTextEl.textContent = 'Copier'; }, 1500);
      });
    });
  </script>
</body>
</html>
